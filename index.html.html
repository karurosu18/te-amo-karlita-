<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #05030a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  .card {
    width: 320px;
    background: #140b1a;
    border-radius: 24px;
    padding: 26px 18px 30px;
    box-shadow: 0 0 40px rgba(255,140,200,0.12), 0 0 0 1px rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
  }
  .glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 15%, rgba(255,150,205,0.18), transparent 60%);
    pointer-events: none;
  }
  .title {
    position: relative;
    z-index: 1;
    text-align: center;
    font-size: 22px;
    font-style: italic;
    color: #ffb6d9;
    letter-spacing: 0.5px;
  }
  .title svg { vertical-align: -3px; margin-left: 4px; animation: pulse 1.6s ease-in-out infinite; }
  .msg {
    position: relative;
    z-index: 1;
    text-align: center;
    font-size: 18px;
    font-style: italic;
    color: #ffd3e8;
    margin-top: 4px;
  }
  .footer {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 16px;
  }
  .footer span { font-size: 13px; color: #c9c2d0; }
  .heart-icon { animation: pulse 1.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
  svg.bouquet { position: relative; z-index: 1; display: block; margin: 4px auto 0; }
  .flower {
    transform-box: fill-box;
    transform-origin: 50% 100%;
  }
  .sway1 { animation: sway1 3.8s ease-in-out infinite; }
  .sway2 { animation: sway2 4.2s ease-in-out infinite; }
  .sway3 { animation: sway1 4.0s ease-in-out infinite 0.4s; }
  .sway4 { animation: sway2 3.6s ease-in-out infinite 0.6s; }
  .sway5 { animation: sway1 4.4s ease-in-out infinite 0.2s; }

  @keyframes sway1 { 0%,100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
  @keyframes sway2 { 0%,100% { transform: rotate(5deg); } 50% { transform: rotate(-5deg); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }
</style>
